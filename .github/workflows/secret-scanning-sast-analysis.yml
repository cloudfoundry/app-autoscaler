name: "Security scanning SAST report pushing"
on:
  push:
    branches: [main] # A push to one of these branches triggers a scan (of the pushed commit).
  pull_request:
    branches: [main] # A PR that targets these branches triggers a scan of the tip of that PR.
  # It is also recommended to schedule a scan for the case that new leaked secrets may be discovered.
  # You should schedule a weekly scan at a random time:
  schedule:
    #        ┌───────────── minute (0 - 59)
    #        │  ┌───────────── hour (0 - 23)
    #        │  │ ┌───────────── day of the month (1 - 31)
    #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
    #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        │  │ │ │ │
    #        *  * * * *
    - cron: '19 14 * * 1'
  # This allows you to trigger this workflow manually from GitHub:    
  workflow_dispatch:

jobs:
  SecurityScanningReportPush:
    uses: "Security-Testing/security-tools-workflows/.github/workflows/secret-scan-report.yml@main"
    secrets: inherit
    permissions:
      security-events: write
      actions: read
      contents: read
      id-token: write
