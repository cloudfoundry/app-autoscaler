---
name: Sync Upstream Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: [self-hosted, solinas]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOSCALER_GITHUB_TOOLS_TOKEN_RW }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync upstream release into main
        env:
          INTERNAL_REPO: ${{ github.repository }}
          INTERNAL_TOKEN: ${{ secrets.AUTOSCALER_GITHUB_TOOLS_TOKEN_RW }}
          UPSTREAM_COM_TOKEN: ${{ secrets.AUTOSCALER_GITHUB_COM_TOKEN }}
        run: uv run .github/scripts/sync-upstream-release.py
