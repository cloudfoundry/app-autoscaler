---
name: Sync Upstream Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: [self-hosted, solinas]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOSCALER_GITHUB_TOOLS_TOKEN_RW }}

      - name: Sync upstream release into main
        uses: jannekem/run-python-script-action@9d8e2e0878d575fb6073277f38ce3f10ebf4f059 # v1.8
        env:
          INTERNAL_REPO: ${{ github.repository }}
          INTERNAL_TOKEN: ${{ secrets.AUTOSCALER_GITHUB_TOOLS_TOKEN_RW }}
          UPSTREAM_COM_TOKEN: ${{ secrets.AUTOSCALER_GITHUB_COM_TOKEN }}
        with:
          script: |
            import runpy
            runpy.run_path(".github/scripts/sync-upstream-release.py", run_name="__main__")
