name: Acceptance Tests – Reusable
on:
  workflow_call:
    inputs:
      suites:
        required: false
        type: string
        default: "[ 'API', 'APP', 'Broker' ]"
      deployment_name:
        required: true
        type: string
    secrets:
      bbl_ssh_key:
        required: true

defaults:
  run:
    shell: bash

env:
  PR_NUMBER: "${{ github.event.pull_request.number }}"
  DEPLOYMENT_NAME: "${{ inputs.deployment_name }}"
  BBL_STATE_PATH: "${{ github.workspace }}/bbl/bbl-state"
  GINKGO_OPTS: "--fail-fast"
  NODES: 4
  AUTOSCALER_DIR: "${{ github.workspace }}/app-autoscaler"
  CPU_UPPER_THRESHOLD: 200

jobs:
  deploy_autoscaler:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for deployment
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}

      - name: Provision DB
        shell: bash
        run: make --directory="${AUTOSCALER_DIR}" provision-db

      - name: Deploy Apps
        shell: bash
        run: |
          make --directory="${AUTOSCALER_DIR}" mta-build
          make --directory="${AUTOSCALER_DIR}" mta-deploy

      - name: Register autoscaler
        shell: bash
        run: make --directory="${AUTOSCALER_DIR}" deploy-register-cf

  acceptance_tests:
    name: Acceptance Tests
    needs: [ deploy_autoscaler ]
    strategy:
      fail-fast: false
      matrix:
        suite: "${{ fromJSON(inputs.suites) }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for acceptance tests
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}
      - name: Run acceptance test via CF task - ${{ matrix.suite }}
        env:
          MATRIX_SUITE: ${{ matrix.suite }}
        shell: bash
        run: |
          #! /usr/bin/env bash
          set -eu -o pipefail

          cd "${AUTOSCALER_DIR}"
          source ./scripts/common.sh
          source ./scripts/vars.source.sh

          cf_login
          cf_target "${autoscaler_org}" "${autoscaler_space}"

          # Run the named CF task with the suite-specific SUITES env var
          task_guid=$(cf run-task acceptance-tests run-acceptance-tests --command "SUITES='${MATRIX_SUITE,,}' bash /home/vcap/app/scripts/run-acceptance-tests-task.sh" -k 2G -m 2G | grep "task id:" | awk '{print $3}')


          echo "Started CF task ${task_guid} for suite ${MATRIX_SUITE}"

          # Poll task status
          while true; do
            task_state=$(cf tasks acceptance-tests | grep "${task_guid}" | awk '{print $3}')
            echo "Task ${task_guid} state: ${task_state}"

            if [[ "${task_state}" == "SUCCEEDED" ]]; then
              echo "Task completed successfully"
              cf logs acceptance-tests --recent
              exit 0
            elif [[ "${task_state}" == "FAILED" ]]; then
              echo "Task failed"
              cf logs acceptance-tests --recent
              exit 1
            fi

            sleep 10
          done

  deployment_cleanup:
    needs: [ deploy_autoscaler, acceptance_tests ]
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-cleanup')"
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for deployment cleanup
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}
      - name: Perform deployment cleanup
        run: |
          make --directory="${AUTOSCALER_DIR}" deploy-cleanup

  # This job will run and fail if any of the jobs it depends on fail or are cancelled.
  # It is an "ugly workaround" for an issue on GitHub Actions side, where
  # skipped jobs are considered successful.
  # See https://github.com/actions/runner/issues/2566#issuecomment-1523814835
  result:
      needs: acceptance_tests
      if: ${{ cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
      name: Result
      runs-on: ubuntu-latest
      steps:
        - run: |
            echo "Some required workflows have failed!"
            exit 1
