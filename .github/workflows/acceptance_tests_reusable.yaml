name: Acceptance Tests – Reusable
on:
  workflow_call:
    inputs:
      suites:
        required: false
        type: string
        default: "[ 'api', 'app', 'broker' ]"
      deployment_name:
        required: true
        type: string
      use_metricsgateway:
        required: false
        type: boolean
        default: false
      metricsforwarder_metrics_gateway_url:
        required: false
        type: string
        default: ""
      existing_organization:
        required: false
        type: string
        default: ""
      autoscaler_org:
        required: false
        type: string
        default: ""
    secrets:
      bbl_ssh_key:
        required: true
      autoscaler_org_manager_password:
        required: false
      autoscaler_other_user_password:
        required: false

defaults:
  run:
    shell: bash

env:
  PR_NUMBER: "${{ github.event.pull_request.number || 'main' }}"
  DEPLOYMENT_NAME: "${{ inputs.deployment_name }}"
  BBL_STATE_PATH: "${{ github.workspace }}/bbl/bbl-state"
  GINKGO_OPTS: "--fail-fast"
  NODES: 8
  AUTOSCALER_DIR: "${{ github.workspace }}/app-autoscaler"
  CPU_UPPER_THRESHOLD: 200
  AUTOSCALER_ORG_MANAGER_PASSWORD: ${{ secrets.autoscaler_org_manager_password }}
  AUTOSCALER_OTHER_USER_PASSWORD: ${{ secrets.autoscaler_other_user_password }}

jobs:
  deploy_autoscaler:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      AUTOSCALER_ORG: ${{ inputs.autoscaler_org }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for deployment
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}

      - name: Cleanup previous deployment
        shell: bash
        run: |
          make --directory="${AUTOSCALER_DIR}" deploy-cleanup || echo "Cleanup warnings expected if nothing exists"

      - name: Create space as org-manager-user (ensures inherent SpaceDeveloper role)
        shell: bash
        run: |
          source "${AUTOSCALER_DIR}/scripts/vars.source.sh"
          source "${AUTOSCALER_DIR}/scripts/common.sh"
          bbl_login

          # Admin ensures org exists and grants OrgManager (needed for space creation)
          cf_login
          find_or_create_org "${AUTOSCALER_ORG}"

          # org-manager-user creates the space — creator auto-gets SpaceManager+SpaceDeveloper
          cf api "https://api.${system_domain}" --skip-ssl-validation
          cf auth "${AUTOSCALER_ORG_MANAGER_USER}" "${AUTOSCALER_ORG_MANAGER_PASSWORD}"
          cf target -o "${AUTOSCALER_ORG}"
          cf create-space "${AUTOSCALER_SPACE}" || echo "Space already exists"
          cf target -s "${AUTOSCALER_SPACE}"

          # Grant admin SpaceDeveloper too (needed for cleanup operations)
          cf_login
          cf set-space-role admin "${AUTOSCALER_ORG}" "${AUTOSCALER_SPACE}" SpaceDeveloper
          cf set-space-role admin "${AUTOSCALER_ORG}" "${AUTOSCALER_SPACE}" SpaceManager

      - name: Provision DB
        shell: bash
        run: make --directory="${AUTOSCALER_DIR}" provision-db

      - name: Deploy Apps
        shell: bash
        env:
          USE_METRICSGATEWAY: ${{ inputs.use_metricsgateway }}
          METRICSFORWARDER_METRICS_GATEWAY_URL: ${{ inputs.metricsforwarder_metrics_gateway_url }}
          EXISTING_ORGANIZATION: ${{ inputs.existing_organization }}
        run: |
          make --directory="${AUTOSCALER_DIR}" build-extension-file
          make --directory="${AUTOSCALER_DIR}" mta-build
          make --directory="${AUTOSCALER_DIR}" mta-deploy

      - name: Register autoscaler
        shell: bash
        env:
          EXISTING_ORGANIZATION: ${{ inputs.existing_organization }}
        run: make --directory="${AUTOSCALER_DIR}" register-broker

  acceptance_tests:
    name: Acceptance Tests - ${{ matrix.suite }}
    needs: [ deploy_autoscaler ]
    runs-on: ubuntu-latest
    env:
      AUTOSCALER_ORG: ${{ inputs.autoscaler_org }}
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(inputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for acceptance tests
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}
      - name: Run acceptance tests via CF tasks - ${{ matrix.suite }}
        shell: bash
        env:
          SUITES: ${{ matrix.suite }}
        run: make --directory="${AUTOSCALER_DIR}" mta-acceptance-tests

  deployment_cleanup:
    needs: [ deploy_autoscaler, acceptance_tests ]
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-cleanup')"
    name: Cleanup
    runs-on: ubuntu-latest
    env:
      AUTOSCALER_ORG: ${{ inputs.autoscaler_org }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: app-autoscaler
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          project-path: "${AUTOSCALER_DIR}"
      - name: Make devbox shellenv available
        run: |
          cd "${AUTOSCALER_DIR}"
          eval "$(devbox shellenv)"
          printenv >> "$GITHUB_ENV"
      - name: Setup environment for deployment cleanup
        uses: ./app-autoscaler/.github/actions/setup-environment
        with:
          ssh-key: ${{ secrets.bbl_ssh_key}}
      - name: Perform deployment cleanup
        run: |
          make --directory="${AUTOSCALER_DIR}" deploy-cleanup

  # This job will run and fail if any of the jobs it depends on fail or are cancelled.
  # It is an "ugly workaround" for an issue on GitHub Actions side, where
  # skipped jobs are considered successful.
  # See https://github.com/actions/runner/issues/2566#issuecomment-1523814835
  result:
      needs: acceptance_tests
      if: ${{ cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
      name: Result
      runs-on: ubuntu-latest
      steps:
        - run: |
            echo "Some required workflows have failed!"
            exit 1
