name: Acceptance Tests - MTA
on:
  push:
    branches: [ main ]
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize ]

concurrency:
  group: "${{ github.workflow }}/${{ github.ref }}"
  cancel-in-progress: true

jobs:
  acceptance_tests_reusable:
    name: "${{ github.workflow }}"
    uses: ./.github/workflows/acceptance_tests_reusable.yaml
    with:
      deployment_name: "autoscaler-mta-${{ github.event.pull_request.number || 'main' }}"
      use_metricsgateway: ${{ github.event_name == 'pull_request' }}
      existing_organization: ${{ github.event_name == 'pull_request' && 'SAP_autoscaler_tests_OSS' || '' }}
    secrets:
      bbl_ssh_key: "${{ secrets.BBL_SSH_KEY }}"
