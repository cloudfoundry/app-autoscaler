---
name: Create Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-ci:
    runs-on: ubuntu-latest
    name: Check acceptance tests passed on main
    steps:
      - name: Verify acceptance tests passed for this commit on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch main \
            --workflow "acceptance_tests_mta.yaml" \
            --status completed \
            --limit 50 \
            --json conclusion,headSha \
            --jq '.[] | select(.headSha == "${{ github.sha }}") | .conclusion' \
            | head -1)
          echo "Acceptance test conclusion for ${{ github.sha }}: ${conclusion}"
          if [[ "${conclusion}" != "success" ]]; then
            echo "Acceptance tests did not pass for commit ${{ github.sha }} (conclusion: ${conclusion:-not found}). Blocking release draft."
            exit 1
          fi

  create-draft-release:
    needs: check-ci
    runs-on: ubuntu-latest
    name: Create draft release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Fetch all history for release notes generation

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          devbox run make release-draft
