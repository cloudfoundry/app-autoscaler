---
name: Create Draft Release

on:
  schedule:
    - cron: '0 2 * * 4'  # 02:00 UTC / 04:00 CEST, Thursday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    name: Create draft release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0  # Fetch all history for release notes generation

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          devbox run make release-draft
