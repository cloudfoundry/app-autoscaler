---
# Increase cf-smoke-tests cleanup timeout to handle slow org deletions
#
# Issue: With cf-deployment v58, org deletion takes ~120 seconds, but
# cf-test-helpers has a 60-second timeout in SynchronizedAfterSuite cleanup.
#
# Symptoms:
#   - Both SMOKE-1-ORG and SMOKE-2-ORG timeout after exactly 60s
#   - Cloud Controller logs show actual deletion takes 120+ seconds
#   - CF CLI shows "OK" in 2ms (misleading - async job accepted, not completed)
#
# Root cause: UNKNOWN (NOT PostgreSQL - cf-deployment uses MySQL which didn't change)
# Workaround: Use cf-smoke-tests' built-in timeout_scale property to multiply
#             all test timeouts by 3x (60s → 180s).
#
# Evidence from Cloud Controller logs (ci/infrastructure/cf-delete-orgs.log):
#   - Job 35d3cb0b-7a2e-4219-ab95-5f94d91d09a3 polled 13 times over 122 seconds
#   - Actual org deletion: 11:57:32 - 12:03:19 = ~2 minutes
#
# Apply after pin-cf-smoke-tests-v42.0.263.yml
#
# See: SMOKE_TEST_TIMEOUT_FIX.md, CORRECTION_CF_USES_MYSQL_NOT_POSTGRES.md

# Scale all timeouts by 3x (60s becomes 180s, 30s becomes 90s, etc.)
# This is the CORRECT property from cf-smoke-tests job spec
- type: replace
  path: /instance_groups/name=smoke-tests/jobs/name=smoke_tests/properties/timeout_scale?
  value: 3

# Also increase CF CLI dial timeout to 5 minutes for slow operations
# This affects CF_DIAL_TIMEOUT environment variable
- type: replace
  path: /instance_groups/name=smoke-tests/jobs/name=smoke_tests/properties/cf_dial_timeout_in_seconds?
  value: 300
