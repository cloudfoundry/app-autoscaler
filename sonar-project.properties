sonar.host.url=https://sonar.tools.sap

sonar.projectKey=applicationautoscaler-app-autoscaler-f7beb
sonar.projectName=app-autoscaler

sonar.sources=.

# The Java analyzer needs compiled classes. The mbt/Maven build (Build stage,
# runs before sonarExecuteScan) compiles these modules into <module>/target/classes.
sonar.java.binaries=scheduler/target/classes,dbtasks/target/classes

# Exclude test code from analysis: Go test files, Java test sources, and the
# integration/, acceptance/, ci/, and scripts/ directories in their entirety.
# Also exclude the vendored Quartz scheduler DDL: these are third-party MySQL/
# Postgres table definitions (not code we author), and the PL/SQL analyzer
# misclassifies them, flagging standard VARCHAR as Oracle-specific VARCHAR2.
sonar.exclusions=**/*_test.go,**/src/test/**,integration/**,acceptance/**,ci/**,scripts/**,**/scheduler/db/quartz_tables_*.sql

# Disable the PL/SQL (Oracle) analyzer: this repo has no Oracle PL/SQL. The
# only .sql files are MySQL/Postgres DDL, which the plsql analyzer wrongly
# treats as PL/SQL (e.g. demanding VARCHAR2 instead of VARCHAR).
sonar.plsql.file.suffixes=

# Go coverage report produced by `make sonar-coverage` (run in the Build stage
# before sonarExecuteScan). Java (JaCoCo) coverage may be added here later.
sonar.go.coverage.reportPaths=coverprofile.out
