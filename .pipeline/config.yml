general:
  buildTool: 'mta'
  productiveBranch: 'main'
  vaultPath: 'piper/PIPELINE-GROUP-1724'
  vaultBasePath: 'piper/PIPELINE-GROUP-1724'
  vaultPipelineName: 'app-autoscaler'
  vaultServerUrl: 'https://vault.tools.sap'
  vaultNamespace: 'ies/hyperspace/pipelines'
  nativeBuild: true
stages:
  Build:
    # After mtaBuild writes the (Java/Node-only) SBOM to sbom-gen/bom-mta.xml, merge in
    # the Go dependency SBOM. mbt does not generate SBOMs for Go modules, so without this
    # the published SBOM would omit every Go dependency. See the script header for details.
    shellExecute:
      sources:
        - ".pipeline/scripts/merge-go-sbom.sh"
  Release:
    sapDownloadArtifact: false
  Post:
    # Secret rotation handled by Hyperspace Portal, enabling it back might cause unintended behavior
    vaultRotateSecretId: false
steps:
  mtaBuild:
    mtaBuildTool: cloudMbt
    mtarGroup: 'com.sap.tools.github.autoscaler'
    dockerImage: devxci/mbtci-java21-node22:latest@sha256:1f76a8031a9d1fcec4ff0c71cbcd648768c76712b2aa304356ffd212b820b477
  sapCallStagingService:
    url: 'https://staging.repositories.cloud.sap/stage/api'
    profile: 'group-1724-default'
  sapCumulusUpload:
    pipelineId: '0a0a9ac2-ed98-4dc1-a0de-79bcc34874ad'
  sonarExecuteScan:
    serverUrl: 'https://sonar.tools.sap'
